<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Bashly — a curated marketplace connecting party hosts with trusted vendors. Coming soon. Join the waitlist." />
<title>Bashly — Celebrations Begin Here | Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet" />

<style>
/* WS Mogila is a paid commercial font (not on Google Fonts).
   To use it, drop WSMogila.woff2 / WSMogila.woff into a /fonts folder
   next to index.html — this @font-face will pick it up automatically.
   Until then, Playfair Display is used as a close visual fallback. */
@font-face {
  font-family: 'WS Mogila';
  src: url('fonts/WSMogila.woff2') format('woff2'),
       url('fonts/WSMogila.woff') format('woff');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}
</style>

<style>
/* ===================== TOKENS ===================== */
:root {
  --coral: #E57C6E;
  --coral-soft: #F4A39A;
  --coral-deep: #C95B4D;
  --cream: #FAF6F1;
  --cream-2: #F1ECE4;
  --ink: #1B1A1A;
  --muted: #6B6360;
  --white: #ffffff;
  --shadow-coral: 0 20px 50px -15px rgba(229, 124, 110, 0.55);
  --shadow-soft: 0 30px 80px -30px rgba(27, 26, 26, 0.25);
  --radius: 999px;
  --ease: cubic-bezier(.2,.8,.2,1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* ===================== AMBIENT BG ===================== */
.bg-wrap {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.blob {
  position: absolute; border-radius: 50%; filter: blur(90px); opacity: .55;
  will-change: transform;
}
.blob.b1 { width: 520px; height: 520px; background: var(--coral-soft); top: -160px; left: -120px; animation: float1 14s ease-in-out infinite alternate; }
.blob.b2 { width: 460px; height: 460px; background: #FFD7B0; bottom: -160px; right: -120px; animation: float2 16s ease-in-out infinite alternate; }
.blob.b3 { width: 360px; height: 360px; background: #FFE7E2; top: 40%; left: 55%; opacity:.45; animation: float1 18s ease-in-out infinite alternate-reverse; }

@keyframes float1 { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,60px) scale(1.08); } }
@keyframes float2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-50px,-40px) scale(1.06); } }

/* Confetti dots */
.confetti { position: absolute; width: 10px; height: 14px; border-radius: 2px; opacity: .85; animation: drift 12s linear infinite; }
@keyframes drift {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: .9; }
  100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
}

/* ===================== LAYOUT ===================== */
.shell {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex; flex-direction: column;
  padding: 28px clamp(20px, 5vw, 64px);
}

/* ===================== HEADER ===================== */
header {
  display: flex; align-items: center; justify-content: space-between;
  animation: fadeDown .9s var(--ease) both;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Comfortaa', sans-serif; font-weight: 700;
  font-size: 28px; color: var(--coral); letter-spacing: -.5px;
}
.logo-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: linear-gradient(135deg, var(--coral), var(--coral-soft));
  box-shadow: 0 6px 16px rgba(229,124,110,.5);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.15);} }

.nav-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius);
  background: rgba(255,255,255,.7); backdrop-filter: blur(12px);
  border: 1px solid rgba(229,124,110,.22);
  color: var(--coral-deep); font-weight: 600; font-size: 13px;
  letter-spacing: .8px; text-transform: uppercase;
}
.nav-pill .live {
  width: 8px; height: 8px; border-radius: 50%; background: var(--coral);
  box-shadow: 0 0 0 0 rgba(229,124,110,.6);
  animation: ring 1.8s infinite;
}
@keyframes ring {
  0% { box-shadow: 0 0 0 0 rgba(229,124,110,.7); }
  70% { box-shadow: 0 0 0 12px rgba(229,124,110,0); }
  100% { box-shadow: 0 0 0 0 rgba(229,124,110,0); }
}

/* ===================== HERO ===================== */
main {
  flex: 1; display: grid; place-items: center; padding: 40px 0;
}
.hero {
  text-align: center; max-width: 880px; width: 100%;
  animation: fadeUp 1s var(--ease) both;
}
.eyebrow {
  display: inline-block;
  padding: 8px 18px; border-radius: var(--radius);
  background: rgba(229,124,110,.12);
  color: var(--coral-deep);
  font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 28px;
}
h1 {
  margin: 0;
  font-family: 'WS Mogila', 'Playfair Display', Georgia, serif;
  font-weight: 800;
  font-size: clamp(34px, 8vw, 76px);
  line-height: 1.02;
  letter-spacing: -2px;
  color: var(--ink);
}
h1 .accent {
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-deep) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  font-style: italic; font-weight: 800;
}
h1 .word { display: inline-block; animation: rise .9s var(--ease) both; }
h1 .word:nth-child(1){ animation-delay: .15s }
h1 .word:nth-child(2){ animation-delay: .3s }
h1 .word:nth-child(3){ animation-delay: .45s }
@keyframes rise { from { opacity:0; transform: translateY(40px); } to { opacity:1; transform: translateY(0); } }

.sub {
  margin: 26px auto 0; max-width: 620px;
  font-size: clamp(15px, 1.6vw, 18px);
  line-height: 1.7; color: var(--muted); font-weight: 400;
  animation: fadeUp 1s var(--ease) .6s both;
}

/* ===================== BALLOON ROW ===================== */
.balloons {
  display: flex; justify-content: center; gap: 14px; margin: 38px 0 8px;
  animation: fadeUp 1s var(--ease) .7s both;
}
.balloon {
  width: 44px; height: 56px; border-radius: 50% 50% 48% 48%;
  position: relative;
  box-shadow: inset -6px -8px 14px rgba(0,0,0,.12), 0 10px 20px rgba(0,0,0,.08);
  animation: bob 4s ease-in-out infinite;
}
.balloon::after {
  content:''; position: absolute; left: 50%; bottom: -22px; width: 1px; height: 22px;
  background: rgba(0,0,0,.25); transform: translateX(-50%);
}
.balloon.c1 { background: var(--coral); animation-delay: 0s; }
.balloon.c2 { background: #F6C26B; animation-delay: .3s; }
.balloon.c3 { background: #7FB6A8; animation-delay: .6s; }
.balloon.c4 { background: #C58FBF; animation-delay: .9s; }
.balloon.c5 { background: #6FA5C9; animation-delay: 1.2s; }
@keyframes bob { 0%,100% { transform: translateY(0) rotate(-2deg);} 50% { transform: translateY(-10px) rotate(2deg);} }

/* ===================== CTA ===================== */
.cta-row {
  margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 16px;
  animation: fadeUp 1s var(--ease) .9s both;
}
.cta {
  position: relative;
  display: inline-flex; align-items: center; gap: 12px;
  padding: 20px 40px;
  font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: .3px;
  color: white; cursor: pointer;
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-deep) 100%);
  border: none; border-radius: var(--radius);
  box-shadow: var(--shadow-coral);
  transition: transform .3s var(--ease), box-shadow .3s var(--ease);
  overflow: hidden;
}
.cta::before {
  content:''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--coral-deep), var(--coral));
  opacity: 0; transition: opacity .3s var(--ease);
}
.cta > * { position: relative; z-index: 1; }
.cta:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 30px 70px -15px rgba(229,124,110,.7); }
.cta:hover::before { opacity: 1; }
.cta:active { transform: translateY(-1px) scale(.99); }
.cta svg { width: 20px; height: 20px; transition: transform .3s var(--ease); }
.cta:hover svg { transform: translateX(4px); }

.cta-note {
  font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px;
}
.cta-note .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--coral); }

/* ===================== FEATURES ===================== */
.features {
  margin-top: 56px; display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 14px; max-width: 760px; margin-left: auto; margin-right: auto;
  animation: fadeUp 1s var(--ease) 1.1s both;
}
.feature {
  background: rgba(255,255,255,.65); backdrop-filter: blur(10px);
  border: 1px solid rgba(27,26,26,.06);
  border-radius: 18px; padding: 18px 16px; text-align: center;
  transition: transform .3s var(--ease), box-shadow .3s var(--ease), background .3s;
}
.feature:hover { transform: translateY(-4px); box-shadow: var(--shadow-soft); background: white; }
.feature .ico { font-size: 22px; margin-bottom: 8px; }
.feature .t { font-weight: 700; font-size: 14px; color: var(--ink); }
.feature .d { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

/* ===================== FOOTER ===================== */
footer {
  text-align: center; padding-top: 32px;
  font-size: 12px; color: var(--muted); letter-spacing: .4px;
  animation: fadeUp 1s var(--ease) 1.3s both;
}
footer .heart { color: var(--coral); }

/* ===================== ANIMATIONS ===================== */
@keyframes fadeUp { from { opacity:0; transform: translateY(24px);} to { opacity:1; transform: translateY(0);} }
@keyframes fadeDown { from { opacity:0; transform: translateY(-16px);} to { opacity:1; transform: translateY(0);} }

/* ===================== RESPONSIVE ===================== */
@media (max-width: 720px) {
  .shell { padding: 22px 18px; }
  .nav-pill { font-size: 11px; padding: 8px 14px; }
  .logo { font-size: 24px; }
  h1 { letter-spacing: -1px; }
  .balloon { width: 34px; height: 44px; }
  .features { grid-template-columns: 1fr; max-width: 360px; }
  .cta { padding: 18px 32px; font-size: 15px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
}
.logo-img {
  width: 50px;
  height: 50px;
  object-fit: contain;
}
</style>
</head>
<body>

<!-- Ambient background -->
<div class="bg-wrap" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div id="confetti-layer"></div>
</div>

<div class="shell">

  <!-- HEADER -->
  <header>

    <div class="logo">
<img src="img/logo_icon.png" alt="logo" class="logo-img">
      <!-- <span class="logo-dot"></span> -->
      <span>bashly</span>
    </div>
   
  </header>

  <!-- HERO -->
  <main>
    <section class="hero">
      <div class="eyebrow">Coming Soon</div>

      <h1>
        <span class="word">Celebrations</span>
        <span class="word">begin</span>
        <span class="word accent">here.</span>
      </h1>

      <p class="sub">
        The curated marketplace for unforgettable celebrations.
      </p>

      <!-- Decorative balloons -->
      <div class="balloons" aria-hidden="true">
        <div class="balloon c1"></div>
        <div class="balloon c2"></div>
        <div class="balloon c3"></div>
        <div class="balloon c4"></div>
        <div class="balloon c5"></div>
      </div>

      <div class="cta-row">
        <button class="cta" id="joinBtn" aria-label="Join the WhatsApp waitlist">
          <span>Join the Waitlist</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 5l7 7-7 7"/>
          </svg>
        </button>
        <div class="cta-note">
          <span class="dot"></span>
          <span>Get launch updates on our WhatsApp channel</span>
        </div>
      </div>

    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    © 2026 Bashly · Celebrations Begin Here. <span class="heart">♥</span>
  </footer>
</div>

<script>
/* ============== WHATSAPP REDIRECT ==============
   Replace WHATSAPP_URL with your real channel invite link. */
const WHATSAPP_URL = "https://whatsapp.com/channel/YOUR_CHANNEL_LINK";

document.getElementById("joinBtn").addEventListener("click", () => {
  // Burst confetti on click for delight
  burst(60);
  setTimeout(() => window.open(WHATSAPP_URL, "_blank", "noopener"), 350);
});

/* ============== PARALLAX BLOBS ============== */
const blobs = document.querySelectorAll(".blob");
window.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5);
  const y = (e.clientY / window.innerHeight - 0.5);
  blobs.forEach((b, i) => {
    const f = (i + 1) * 14;
    b.style.transform = `translate(${x * f}px, ${y * f}px)`;
  });
});

/* ============== AMBIENT CONFETTI ============== */
const layer = document.getElementById("confetti-layer");
const colors = ["#E57C6E", "#F6C26B", "#7FB6A8", "#C58FBF", "#6FA5C9", "#F4A39A"];

function spawnConfetti() {
  const c = document.createElement("div");
  c.className = "confetti";
  c.style.left = Math.random() * 100 + "vw";
  c.style.background = colors[Math.floor(Math.random() * colors.length)];
  c.style.animationDuration = (8 + Math.random() * 8) + "s";
  c.style.animationDelay = (Math.random() * 2) + "s";
  c.style.transform = `rotate(${Math.random() * 360}deg)`;
  layer.appendChild(c);
  setTimeout(() => c.remove(), 18000);
}
setInterval(spawnConfetti, 600);
for (let i = 0; i < 12; i++) spawnConfetti();

/* ============== CLICK BURST ============== */
function burst(n) {
  const btn = document.getElementById("joinBtn");
  const r = btn.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  for (let i = 0; i < n; i++) {
    const p = document.createElement("div");
    p.className = "confetti";
    p.style.position = "fixed";
    p.style.left = cx + "px";
    p.style.top = cy + "px";
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animation = "none";
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const speed = 200 + Math.random() * 350;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed - 200;
    const rot = Math.random() * 720;
    p.animate(
      [
        { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
        { transform: `translate(${vx}px, ${vy + 600}px) rotate(${rot}deg)`, opacity: 0 }
      ],
      { duration: 1200 + Math.random() * 600, easing: "cubic-bezier(.2,.8,.2,1)" }
    ).onfinish = () => p.remove();
  }
}
</script>

</body>
</html>
